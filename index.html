<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>WSS Push Client (Roles)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #d4d4d4; padding: 20px; }
        #chat { border: 1px solid #333; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background-color: #252526; }
        input { padding: 10px; background-color: #3c3c3c; border: none; color: white; margin-right: 5px;}
        button { padding: 10px 20px; background-color: #0e639c; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #1177bb; }
    </style>
</head>
<body>

    <h2 id="header">Connecting...</h2>
    <div id="chat"></div>
    
    <div style="display: flex;">
        <input type="text" id="rolesInput" placeholder="Одержувачі (напр: dispetcher_, admin)" style="width: 35%;">
        <input type="text" id="messageInput" placeholder="Текст заявки..." style="width: 50%;">
        <button onclick="sendMessage()">Send Zayavka</button>
    </div>

    <script>
        let myRole = prompt("Введіть ваш Нік або Роль (напр. dispetcher_):", "dispetcher_");
        document.getElementById("header").innerText = "WSS Client (Роль: " + myRole + ")";

        const ws = new WebSocket("ws://172.21.208.235:8080/?id=" + myRole);

        ws.onopen = () => {
            document.getElementById("chat").innerHTML += "<p style='color: #4CAF50;'>[System] Securely Connected to C++ Server!</p>";
        };

        ws.onerror = (error) => {
            document.getElementById("chat").innerHTML += "<p style='color: #ff3333;'>[System Error] З'єднання відхилено. Можливо, браузер блокує самопідписаний сертифікат WSS.</p>";
        };

        ws.onclose = () => {
            document.getElementById("chat").innerHTML += "<p style='color: #ff3333;'>[System] З'єднання закрито сервером.</p>";
        };

        ws.onmessage = (event) => {
            const chat = document.getElementById("chat");
            try {
                let parsedData = JSON.parse(event.data);
                
                if (parsedData.action === "server_reboot") {
                    chat.innerHTML += "<p style='color: #ff6600; font-size: 18px; font-weight: bold;'>[SERVER WARNING]: " + parsedData.message + "</p>";
                } else {
                    chat.innerHTML += "<p style='color: #ffcc00;'><b>Incoming:</b> " + event.data + "</p>";
                }
            } catch (e) {
                chat.innerHTML += "<p style='color: #ffcc00;'><b>Incoming:</b> " + event.data + "</p>";
            }
            chat.scrollTop = chat.scrollHeight;
        };

        function sendMessage() {
            const textInput = document.getElementById("messageInput");
            const rolesInput = document.getElementById("rolesInput");
            
            if (textInput.value) {
                let rolesStr = rolesInput.value.trim();
                let targetRoles = rolesStr.split(',').map(r => r.trim()).filter(r => r.length > 0);

                let payload = {
                    action: targetRoles.length > 0 ? "insert_zayavka" : "broadcast",
                    id_action: Math.floor(Math.random() * 1000),
                    content: textInput.value,
                    author: myRole
                };

                if (targetRoles.length > 0) {
                    payload.user = targetRoles;
                }

                ws.send(JSON.stringify(payload));
                
                const chat = document.getElementById("chat");
                let toWho = targetRoles.length > 0 ? "to [" + targetRoles.join(", ") + "]" : "to All";
                chat.innerHTML += "<p><b>You (" + toWho + "):</b> " + textInput.value + "</p>";
                chat.scrollTop = chat.scrollHeight;
                
                textInput.value = "";
            }
        }
    </script>
</body>
</html>
